name: Update History Stats

on:
  schedule:
    - cron: '50 23 * * *'
  workflow_dispatch:

jobs:
  generate-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run history generator
      run: python3 generate_history.py

    - name: Commit and push changes
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add .
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update history stats [$(date)]"
          git push
        fi